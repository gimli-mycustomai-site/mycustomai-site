  <style>
    .audit-form { max-width: 600px; margin: 60px auto; padding: 40px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; }

    input, textarea, select { width: 100%; padding: 12px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: white; font-size: 1rem; }
    .btn-submit { width: 100%; padding: 15px; background: #6366f1; color: white; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 1.1rem; }

<body>
  <nav class="nav"><div class="container"><div class="nav-logo" onclick="window.location.href='index.html'" style="cursor:pointer;">My<span>Custom</span>AI</div></div></nav>

  <div class="container">
    <div class="audit-form">
      <h1 style="margin-bottom: 10px;">Custom AI Potential Audit</h1>
      <p style="color: #94a3b8; margin-bottom: 20px;">Tell us about your business. We'll analyze your workflows and send a personalized ROI roadmap. No call required.</p>

      <div style="display:inline-flex;align-items:center;gap:8px;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);border-radius:8px;padding:10px 16px;margin-bottom:28px;">
        <span style="color:#22c55e;font-size:1rem;">⚡</span>
        <span style="color:#86efac;font-size:0.875rem;font-weight:600;">We respond within 24 hours — usually same day.</span>
      </div>

      <form id="auditForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="name" required placeholder="Alex Rivera">
        </div>
        <div class="form-group">
          <label>Company Name / Industry</label>
          <input type="text" name="company" required placeholder="Rivera Consulting / Real Estate">
        </div>
        <div class="form-group">
          <label>Business Email</label>
          <input type="email" name="email" required placeholder="alex@company.com">
        </div>
        <div class="form-group">
          <label>Company Size</label>
          <select name="size">
            <option value="solo">Solo Entrepreneur</option>
            <option value="small">Small Team (2-10)</option>
            <option value="mid">Scaling Team (11-50)</option>
            <option value="large">Enterprise (50+)</option>
          </select>
        </div>
        <div class="form-group">
          <label>What is your biggest operational bottleneck?</label>
          <textarea name="bottleneck" rows="3" placeholder="Examples: Lead follow-up is too slow, manual data entry, customer support is overwhelmed..."></textarea>
        </div>
        <div class="form-group">
          <label>Location &amp; Timezone (State/Region)</label>
          <input type="text" name="location" required placeholder="e.g., Honolulu, HI or New York, NY">
        </div>
        <div class="form-group">
          <label>How does your team currently pulse with AI?</label>
          <select name="proficiency" required>
            <option value="" disabled selected>Select level...</option>
            <option value="Novice">Novice: Just starting to explore</option>
            <option value="Intermediate">Intermediate: Occasional ChatGPT/Tool use</option>
            <option value="Advanced">Advanced: Some integrated API/Auto workflows</option>
          </select>
        </div>
        <div class="form-group">
          <label>In your ideal Mastery scenario, which function needs the most automation?</label>
          <input type="text" name="target_function" required placeholder="e.g., Sales, Ops, Fulfillment...">
        </div>
        <div class="form-group">
          <label>Data Readiness: Do you have a centralized Source of Truth (CRM, Notion, Drive)?</label>
          <select name="data_readiness" required>
            <option value="" disabled selected>Select readiness...</option>
            <option value="Organized">Yes - Organized and ready</option>
            <option value="Scattered">Yes - But it's scattered/messy</option>
            <option value="None">No - We need to build one</option>
          </select>
        </div>
        <div class="form-group">
          <label>List your top 3-5 Must-Have software tools:</label>
          <input type="text" name="stack" required placeholder="e.g., Shopify, Slack, Gmail, HubSpot...">
        </div>
        <div class="form-group">
          <label>Est. weekly hours spent on repetitive tasks (copy-pasting, routine emails)?</label>
          <input type="number" name="manual_hours" required placeholder="e.g., 20">
        </div>
        <div class="form-group">
          <label>What is your primary driver for this audit?</label>
          <select name="driver" required>
            <option value="" disabled selected>Select driver...</option>
            <option value="Growth">Scale output without hiring</option>
            <option value="Time">Reclaim my personal time</option>
            <option value="Efficiency">Internal team efficiency</option>
          </select>
        </div>
        <div class="audit-textarea-container" style="margin-top: 2rem;">
          <label class="audit-header-prompt">
            <h3 style="color: #fff; margin-bottom: 0.5rem;">Tell Us Everything</h3>
            <p style="color: #a0a0a0; font-size: 0.95rem; margin-bottom: 1.5rem; line-height: 1.5;">
              To build a sovereign architecture, we need to see the full picture. Don't hold back — describe your current bottlenecks, your vision for automation, and what mastery looks like for your specific business.
            </p>
          </label>
          <textarea
            name="deep_dive"
            placeholder="Describe your workflows, the software you love (or hate), and exactly where you feel the friction..."
            style="width: 100%; min-height: 350px; padding: 1.5rem; background-color: #1a1a1a; border: 2px solid #333; border-radius: 8px; color: #fff; font-size: 1rem; line-height: 1.6; resize: vertical;"
            required
          ></textarea>
        </div>
        
        <button type="submit" class="btn-submit" style="margin-top:24px;" id="auditSubmit">Submit Audit Request →</button>
      </form>
    </div>
  </div>

<footer class="footer" style="border-top:1px solid #e5e7eb; margin-top:auto;">
  <div class="container footer-inner">
    <div class="footer-logo">My<span>Custom</span>AI</div>
    <div class="footer-copy">&copy; 2026 MyCustomAI. Strategic In-House AI Consulting.</div>
    <div class="footer-copy" style="margin-top:8px;">
      <a href="privacy.html" style="color:#64748b;font-size:0.85rem;text-decoration:none;">Privacy Policy</a>
    </div>
  </div>
</footer>

<script>
document.getElementById("auditForm").addEventListener("submit", function(e) {
  e.preventDefault();
  var btn = document.getElementById("auditSubmit");
  btn.textContent = "Submitting…";
  btn.disabled = true;

  var f = this;
  var data = {
    name: f.name.value, company: f.company.value, email: f.email.value,
    size: f.size.value, bottleneck: f.bottleneck.value, location: f.location.value,
    proficiency: f.proficiency.value, target_function: f.target_function.value,
    data_readiness: f.data_readiness.value, stack: f.stack.value,
    manual_hours: f.manual_hours.value, driver: f.driver.value
  };

  var rows = Object.entries(data).map(function(kv) {
    return "<tr><td style='padding:8px;font-weight:bold;background:#f5f5f5;'>" + kv[0].replace(/_/g," ") + "</td><td style='padding:8px;'>" + (kv[1]||"") + "</td></tr>";
  }).join("");

  var html = "<h2>New Audit Request — MyCustomAI.co</h2><table style='border-collapse:collapse;width:100%;'>" + rows + "</table>";

  fetch("https://api.resend.com/emails", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": "Bearer re_9btMtALT_KtKU358beaEmovP9UtpqFdnd" },
    body: JSON.stringify({ from: "mycustomai.co <onboarding@resend.dev>", to: ["gimlikazaddum@gmail.com"], subject: "New Audit Request — " + (data.company || data.name), html: html })
  }).catch(function(err) { console.warn("Email error:", err.message); });

  setTimeout(function() { window.location.href = "confirmation.html"; }, 2000);
});
</script>
