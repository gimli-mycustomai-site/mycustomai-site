<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" fill="none">
  <!-- Stem -->
  <path d="M32 78 C32 78 30 62 31 52 C31.5 47 32 44 32 44"
    stroke="#2D5016" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Stem highlight -->
  <path d="M32 76 C32 76 31.2 62 31.8 52"
    stroke="#4A7C59" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>

  <!-- Main leaf body — broad heart-shaped taro leaf -->
  <path d="M32 44
    C32 44 28 41 23 37
    C16 32 8 26 5 18
    C2 10 6 3 13 2
    C18 1 24 4 28 8
    C29.5 10 31 13 32 16
    C33 13 34.5 10 36 8
    C40 4 46 1 51 2
    C58 3 62 10 59 18
    C56 26 48 32 41 37
    C36 41 32 44 32 44Z"
    fill="url(#leafGrad)"/>

  <!-- Subtle leaf edge shading -->
  <path d="M32 44
    C32 44 28 41 23 37
    C16 32 8 26 5 18
    C2 10 6 3 13 2
    C18 1 24 4 28 8
    C29.5 10 31 13 32 16
    C33 13 34.5 10 36 8
    C40 4 46 1 51 2
    C58 3 62 10 59 18
    C56 26 48 32 41 37
    C36 41 32 44 32 44Z"
    fill="none" stroke="#2D5016" stroke-width="0.8" opacity="0.4"/>

  <!-- Center midrib -->
  <path d="M32 44 C32 40 31.5 30 32 16"
    stroke="#2D5016" stroke-width="2" stroke-linecap="round"/>
  <!-- Center midrib highlight -->
  <path d="M32.4 43 C32.3 38 32 28 32.4 17"
    stroke="#7AAD85" stroke-width="0.7" stroke-linecap="round" opacity="0.6"/>

  <!-- Left primary veins -->
  <path d="M30.5 38 C26 36 18 32 11 25" stroke="#2D5016" stroke-width="1.3" stroke-linecap="round" opacity="0.8"/>
  <path d="M30 32 C25 30 17 26 11 19" stroke="#2D5016" stroke-width="1.1" stroke-linecap="round" opacity="0.75"/>
  <path d="M30 25 C26 23 20 19 16 13" stroke="#2D5016" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <path d="M30.5 19 C27 17 23 13 21 8" stroke="#2D5016" stroke-width="0.9" stroke-linecap="round" opacity="0.65"/>

  <!-- Right primary veins -->
  <path d="M33.5 38 C38 36 46 32 53 25" stroke="#2D5016" stroke-width="1.3" stroke-linecap="round" opacity="0.8"/>
  <path d="M34 32 C39 30 47 26 53 19" stroke="#2D5016" stroke-width="1.1" stroke-linecap="round" opacity="0.75"/>
  <path d="M34 25 C38 23 44 19 48 13" stroke="#2D5016" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <path d="M33.5 19 C37 17 41 13 43 8" stroke="#2D5016" stroke-width="0.9" stroke-linecap="round" opacity="0.65"/>

  <!-- Left secondary veins -->
  <path d="M21 29 C19 27 17 24 16 22" stroke="#2D5016" stroke-width="0.6" stroke-linecap="round" opacity="0.4"/>
  <path d="M18 23 C16 21 15 18 14.5 16" stroke="#2D5016" stroke-width="0.6" stroke-linecap="round" opacity="0.4"/>

  <!-- Right secondary veins -->
  <path d="M43 29 C45 27 47 24 48 22" stroke="#2D5016" stroke-width="0.6" stroke-linecap="round" opacity="0.4"/>
  <path d="M46 23 C48 21 49 18 49.5 16" stroke="#2D5016" stroke-width="0.6" stroke-linecap="round" opacity="0.4"/>

  <!-- Light overlay for depth -->
  <path d="M32 16 C31 20 28 28 27 36 C26 40 28 43 32 44 C30 40 29 35 30 28 C30.5 22 31.5 18 32 16Z"
    fill="white" opacity="0.08"/>

  <defs>
    <linearGradient id="leafGrad" x1="10" y1="2" x2="54" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5C9E6A"/>
      <stop offset="40%" stop-color="#4A7C59"/>
      <stop offset="100%" stop-color="#2D5016"/>
    </linearGradient>
  </defs>
